<div class="container">
  <header>
    <div class="logo">
      <button type="button" class="back-circle" (click)="goBack()" aria-label="Go back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </button>
      <img src="/assets/logo-stream.png" alt="lova logo" width="120" />
    </div>
  </header>

  <main>
    <h1>Compass of Culture</h1>
    <p class="subtitle">Understand the organizational flow...</p>

    <form [formGroup]="agreementForm" (ngSubmit)="completeOnboarding()">
      <section class="policy-summary shadow-sm">
        <div class="header d-flex justify-content-between">
          <span class="font-bold">Summary & Principles</span>
          <span class="right" *ngIf="!hasReadPolicy" style="color: #ef4444;">
            Scroll to read full text ↓
          </span>
          <span class="right" *ngIf="hasReadPolicy" style="color: #22c55e;">
            <i class="fas fa-check-circle"></i> Read completed
          </span>
        </div>
        
        <!-- Clean textarea without extra spaces inside tags -->
        <textarea 
          readonly 
          class="policy-textarea"
          (scroll)="onScrollPolicy($event)"
          placeholder="Loading terms...">{{ policyContent }}</textarea>
      </section>

      <div class="form-actions-footer">
        <div class="checkbox-container" [class.disabled-opacity]="!hasReadPolicy">
          <input type="checkbox" id="agreeBox" formControlName="agree" />
          <label for="agreeBox">I understand and flow with these values.</label>
        </div>

        <button 
          class="flow-btn" 
          type="submit" 
          [disabled]="!agreementForm.valid || !hasReadPolicy"
          [class.btn-disabled]="!agreementForm.valid || !hasReadPolicy">
          I Flow With This
        </button>
      </div>

      <p class="read-hint text-center" *ngIf="!hasReadPolicy">
        * Please scroll to the bottom of the summary to enable the agreement checkbox.
      </p>
    </form>

    <div class="progress-bar-steps">
      <div class="step active"></div>
      <div class="step active"></div>
      <div class="step active"></div>
      <div class="step active"></div>
      <div class="step active"></div>
      <div class="step active"></div>
    </div>
  </main>
</div>
