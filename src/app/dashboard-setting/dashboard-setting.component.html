<div class="settings-container">
  <div class="settings-header">
    <!-- Removed other tabs and kept a single, styled "Profile" header -->
    <div class="profile-header-tab">
      <i class="fas fa-user"></i> Profile
    </div>
  </div>

  <div class="settings-content" *ngIf="!isLoading">
    <form [formGroup]="profileForm">
      <div class="section-header">
        <h2><i class="fas fa-info-circle"></i> Personal Information</h2>
        <button *ngIf="!isEditing" class="edit-button" (click)="toggleEdit()">
          <i class="fas fa-pencil-alt"></i> Edit Profile
        </button>
        <div *ngIf="isEditing" class="edit-actions">
          <button type="button" class="cancel-button" (click)="cancelEdit()">Cancel</button>
          <button type="button" class="save-button" (click)="saveProfile()" [disabled]="profileForm.invalid">Save</button>
        </div>
      </div>

      <div class="profile-grid">
        <div class="profile-summary">
          <img [src]="'https://i.pravatar.cc/100?u=' + employeeData?.empId" alt="Employee Avatar" class="avatar">
          <p class="employee-name">{{ employeeData?.firstName }} {{ employeeData?.surname }}</p>
          <p class="job-role">{{ profileForm.get('role')?.value }}</p>
          <p class="employee-id">Employee ID: {{ employeeData?.empId }}</p>
        </div>

        <div class="form-field">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" formControlName="firstName" [readonly]="!isEditing">
        </div>

        <div class="form-field">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" formControlName="lastName" [readonly]="!isEditing">
        </div>

        <div class="form-field full-width">
          <label for="workEmail">Work Email Address</label>
          <input type="email" id="workEmail" formControlName="workEmail" readonly>
        </div>
        
        <div class="form-field full-width">
          <label for="personalEmail">Personal Email Address</label>
          <input type="email" id="personalEmail" formControlName="personalEmail" [readonly]="!isEditing">
        </div>

        <div class="form-field">
          <label for="phone">Phone Number</label>
          <input type="text" id="phone" formControlName="phone" [readonly]="!isEditing">
        </div>
        
        <div class="form-field">
            <label>Salary</label>
            <input type="text" value="7,00,000" readonly>
        </div>

        <div class="form-field">
          <label for="department">Department</label>
          <input type="text" id="department" formControlName="department" [readonly]="!isEditing">
        </div>

        <div class="form-field">
          <label for="role">Role</label>
          <input type="text" id="role" formControlName="role" [readonly]="!isEditing">
        </div>

        <div class="form-field">
          <label for="reportingTo">Reporting to</label>
          <input type="text" id="reportingTo" formControlName="reportingTo" [readonly]="!isEditing">
        </div>

        <div class="form-field">
          <label for="workShift">Work Shift</label>
          <input type="text" id="workShift" formControlName="workShift" [readonly]="!isEditing">
        </div>
        
        <div class="form-field full-width">
            <label for="address">Address</label>
            <textarea id="address" formControlName="address" rows="3" [readonly]="!isEditing"></textarea>
        </div>
      </div>
    </form>
  </div>
  <div *ngIf="isLoading" class="loading-spinner">
      <p>Loading settings...</p>
  </div>
</div>
