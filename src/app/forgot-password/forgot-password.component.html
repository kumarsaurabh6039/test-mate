<div class="full-bg-container">
  <div class="glass-card">
    
    <!-- Header Section -->
    <div class="header-section">
      <h1>Recover Access</h1>
      <p class="subtitle" *ngIf="currentStep === 1">Don't worry, it happens to the best of us.</p>
      <p class="subtitle" *ngIf="currentStep === 2">We've sent a code to <strong>{{ userEmail }}</strong></p>
      <p class="subtitle" *ngIf="currentStep === 3">Secure your account with a fresh start.</p>
    </div>

    <!-- Progress Steps (Visual Indicator) -->
    <div class="steps-indicator">
      <div class="step" [class.active]="currentStep >= 1" [class.completed]="currentStep > 1">1</div>
      <div class="line" [class.active]="currentStep > 1"></div>
      <div class="step" [class.active]="currentStep >= 2" [class.completed]="currentStep > 2">2</div>
      <div class="line" [class.active]="currentStep > 2"></div>
      <div class="step" [class.active]="currentStep >= 3">3</div>
    </div>

    <!-- STEP 1: Email Input -->
    <form [formGroup]="emailForm" (ngSubmit)="requestOtp()" *ngIf="currentStep === 1" class="fade-in">
      <div class="form-group">
        <label>Registered Email ID</label>
        <input type="email" formControlName="email" placeholder="e.g. employee@company.com" />
        <div class="error-text" *ngIf="emailForm.get('email')?.touched && emailForm.get('email')?.invalid">
          Please enter a valid email.
        </div>
      </div>
      
      <div class="actions">
        <button type="button" class="btn-secondary" (click)="cancel()">Back to Login</button>
        <button type="submit" class="btn-primary" [disabled]="emailForm.invalid || isLoading">
          {{ isLoading ? 'Sending...' : 'Send OTP' }}
        </button>
      </div>
    </form>

    <!-- STEP 2: OTP Input -->
    <form [formGroup]="otpForm" (ngSubmit)="verifyOtp()" *ngIf="currentStep === 2" class="fade-in">
      <div class="form-group">
        <label>Enter Verification Code</label>
        <input type="number" formControlName="otp" placeholder="XXXXXX" class="otp-input" />
        <p class="resend-link">
            Didn't get it? <a (click)="resendOtp()">Resend Code</a>
        </p>
      </div>

      <div class="actions">
        <button type="button" class="btn-secondary" (click)="currentStep = 1">Change Email</button>
        <button type="submit" class="btn-primary" [disabled]="otpForm.invalid || isLoading">
          {{ isLoading ? 'Verifying...' : 'Verify & Proceed' }}
        </button>
      </div>
    </form>

    <!-- STEP 3: New Password -->
    <form [formGroup]="resetForm" (ngSubmit)="finalizeReset()" *ngIf="currentStep === 3" class="fade-in">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" formControlName="newPassword" placeholder="Create new password" />
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" formControlName="confirmPassword" placeholder="Confirm new password" />
        <div class="error-text" *ngIf="resetForm.errors?.['mismatch'] && resetForm.get('confirmPassword')?.touched">
          Passwords do not match.
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="btn-primary full-width" [disabled]="resetForm.invalid || isLoading">
          {{ isLoading ? 'Updating...' : 'Reset Password' }}
        </button>
      </div>
    </form>

  </div>
</div>
