<div class="onboarding-wrapper">
  <img src="/assets/onbording background.jpg" alt="Stage Background" class="background" />

  <!-- Back button — same circular style as sign-up-step2 -->
  <button type="button" class="back-circle" (click)="goBack()" aria-label="Go back">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
  </button>

  <div class="content">
    <img src="/assets/logo-stream.png" alt="LovaHR Logo" class="logo" />

    <h1 class="title">The Lova Journey</h1>
    <p class="subtitle">
      Each screen is a stage, with a name and purpose.<br />
      Let's design it like a story
    </p>

    <button mat-raised-button color="warn" (click)="startOnboarding()">Start Onboarding</button>
  </div>
</div>
