<div class="main-wrapper">
    <div class="left-section">
        <header>
            <button type="button" class="back-circle" (click)="goBack()" aria-label="Go back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
        </button>
        <img src="/assets/logo-stream.png" alt="Logo" class="logo" />
        </header>

        <h2>
            Your <span class="highlight">Constellation</span>
            <span class="subtext">People Around You</span>
        </h2>

        <div class="org-tree">
            <div class="level top">
                <div class="person" id="boss">
                    <img src="/assets/avatar-new.jpg" alt="Boss" />
                    <p>The Boss</p>
                </div>
                <div class="person" id="hr">
                    <img src="/assets/avatar-new.jpg" alt="HR" />
                    <p>The HR</p>
                </div>
            </div>

            <div class="level middle">
                <div class="person" id="manager">
                    <img src="/assets/avatar-new.jpg" alt="Manager" />
                    <p>Reporting Manager</p>
                </div>
            </div>

            <div class="level third">
                <div class="person" id="t1">
                    <img src="/assets/avatar-new.jpg" alt="" />
                </div>
                <div class="person" id="t2">
                    <img src="/assets/avatar-new.jpg" alt="" />
                </div>
            </div>

            <div class="level bottom">
                <div class="person" id="b1"><img src="/assets/avatar-new.jpg" alt="" /></div>
                <div class="person" id="b2"><img src="/assets/avatar-new.jpg" alt="" /></div>
                <div class="person" id="b3"><img src="/assets/avatar-new.jpg" alt="" /></div>
                <div class="person" id="b4"><img src="/assets/avatar-new.jpg" alt="" /></div>
                <div class="person" id="b5"><img src="/assets/avatar-new.jpg" alt="" /></div>
                <div class="person" id="b6"><img src="/assets/avatar-new.jpg" alt="" /></div>
                <div class="person" id="b7"><img src="/assets/avatar-new.jpg" alt="" /></div>
            </div>

            <button class="dig" (click)="skipHello()">Dig Into Family</button>
        </div>
    </div>

    <div class="right-section">
        <button class="say-hello" (click)="sayHello()">Say Hello</button>
        <img src="/assets/tree.png" alt="Tree Illustration" class="tree-image" />
    </div>
</div>
